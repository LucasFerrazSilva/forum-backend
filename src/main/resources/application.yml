spring:
  application:
    name: Forum Back-end

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/forum}
    username: ${DATABASE_USER:forum_user}
    password: ${DATABASE_PASSWORD:forum_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 3000  # ms

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  docker:
    compose:
      file: compose.yaml

  devtools:
    restart:
      poll-interval: 2000
      quiet-period: 1000

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:contato@forum.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH:false}
          starttls:
            enable: ${MAIL_TLS:false}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://ff.lucasferraz.cloud}

security:
  pepper: ${PASSWORD_PEPPER:PASSWORD_PEPPER}
  rounds: ${PASSWORD_ROUNDS:14}

server:
  activation-token:
    base-url: ${ACTIVATION_TOKEN_BASE_URL:http://localhost:8080}
    expiration-days: ${ACTIVATION_TOKEN_EXPIRATION_DAYS:7}
  cookie:
    name: session_id
    secure: ${COOKIE_SECURE:false}
    expiration-days: 30

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    mail:
      enabled: false

