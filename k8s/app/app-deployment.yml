apiVersion: apps/v1
kind: Deployment
metadata:
  name: forum-app-deployment
  namespace: forum
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: forum-app
  template:
    metadata:
      labels:
        app: forum-app
    spec:
      containers:
        - name: forum-app
          image: lucasferraz95/forum-backend:1.0.0
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          env:
            - name: DATABASE_URL
              value: "jdbc:postgresql://postgres:5432/forum"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: PASSWORD_PEPPER
              valueFrom:
                secretKeyRef:
                  name: security
                  key: PASSWORD_PEPPER
            - name: MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: security
                  key: MAIL_HOST
            - name: MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: security
                  key: MAIL_PORT
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: security
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: security
                  key: MAIL_PASSWORD
            - name: MAIL_AUTH
              valueFrom:
                secretKeyRef:
                  name: security
                  key: MAIL_AUTH
            - name: MAIL_TLS
              valueFrom:
                secretKeyRef:
                  name: security
                  key: MAIL_TLS
            - name: COOKIE_SECURE
              value: "true"
